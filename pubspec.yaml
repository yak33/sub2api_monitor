name: sub2api_monitor
description: Sub2API Monitor - AI API Gateway monitoring app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.14
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  pull_down_button: ^0.10.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Network
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Routing
  go_router: ^14.6.2

  # Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # Charts
  fl_chart: ^0.69.2

  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.19.0
  url_launcher: ^6.3.1
  timeago: ^3.7.0
  logger: ^2.5.0
  connectivity_plus: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.3.14

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
